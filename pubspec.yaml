name: e_travel
description: "E-Travel - Aplikasi Pemesanan Tiket Minibus/Travel"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  iconsax: ^0.0.8
  mobile_scanner: ^6.0.2
  image_picker: ^1.2.1
  http: ^1.6.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.2
  google_maps_flutter: ^2.14.2
  pdf: ^3.11.2
  printing: ^5.13.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

