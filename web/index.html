<!DOCTYPE html>
<html lang="id">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="E-Travel — Aplikasi Pemesanan Tiket Travel & Minibus">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- ════════════════════════════════════════════════════
       PWA — Android Chrome
       ════════════════════════════════════════════════════ -->
  <meta name="theme-color" content="#0F4C81">
  <link rel="manifest" href="manifest.json">

  <!-- ════════════════════════════════════════════════════
       PWA — Apple iOS (Add to Home Screen)
       ════════════════════════════════════════════════════ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="E-Travel">

  <!-- Apple Touch Icons — HD resolusi (tidak ada border hitam) -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/Icon-120.png">
  <link rel="apple-touch-icon" sizes="76x76" href="icons/Icon-76.png">

  <!-- Apple Splash Screens (iPhone & iPad) -->
  <meta name="apple-mobile-web-app-orientations" content="portrait">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/Icon-192.png">
  <link rel="shortcut icon" href="favicon.png">

  <title>E-Travel</title>

  <!-- Prevent FOUC / white flash -->
  <style>
    html { background-color: #0F4C81; }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
